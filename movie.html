<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CineMatch AI</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#0f172a;
    color:white;
    overflow-x:hidden;
}

/* HEADER */

header{
    width:100%;
    min-height:100vh;
    background:
    linear-gradient(rgba(0,0,0,0.75),rgba(0,0,0,0.8)),
    url("https://images.unsplash.com/photo-1517604931442-7e0c8ed2963c?auto=format&fit=crop&w=1600&q=80");

    background-size:cover;
    background-position:center;

    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;

    padding:20px;
}

.hero{
    width:100%;
    max-width:750px;
}

.hero h1{
    font-size:65px;
    margin-bottom:20px;

    background:linear-gradient(to right,#38bdf8,#818cf8,#c084fc);

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.hero p{
    font-size:18px;
    color:#e2e8f0;
    line-height:1.7;
    margin-bottom:35px;
}

/* SEARCH */

.search-box{
    width:100%;
    display:flex;
    gap:15px;
    justify-content:center;
    flex-wrap:wrap;
}

.search-box input{
    flex:1;
    min-width:260px;
    max-width:450px;

    padding:18px;

    border:none;
    outline:none;

    border-radius:15px;

    background:rgba(255,255,255,0.12);

    color:white;
    font-size:16px;

    backdrop-filter:blur(12px);
}

.search-box input::placeholder{
    color:#cbd5e1;
}

.search-box button{

    padding:18px 35px;

    border:none;
    border-radius:15px;

    background:linear-gradient(to right,#6366f1,#8b5cf6);

    color:white;
    font-size:16px;
    font-weight:600;

    cursor:pointer;
    transition:0.3s;
}

.search-box button:hover{
    transform:translateY(-3px);
}

/* SECTION */

.section-title{
    text-align:center;
    margin:60px 0 35px;
    font-size:40px;
}

/* MOVIES */

.movies{

    width:90%;
    margin:auto;

    display:grid;

    grid-template-columns:
    repeat(auto-fit,minmax(260px,1fr));

    gap:30px;

    padding-bottom:70px;
}

.card{

    background:#111827;

    border-radius:25px;

    overflow:hidden;

    transition:0.4s;

    position:relative;

    box-shadow:0 12px 25px rgba(0,0,0,0.4);
}

.card:hover{
    transform:translateY(-10px);
}

/* FIXED IMAGE ISSUE */

.card img{

    width:100%;
    height:350px;

    object-fit:cover;

    display:block;
}

/* RATING */

.overlay{

    position:absolute;

    top:15px;
    right:15px;

    background:#38bdf8;

    padding:8px 14px;

    border-radius:30px;

    font-size:14px;
    font-weight:600;
}

/* CONTENT */

.card-content{
    padding:22px;
}

.card-content h2{
    font-size:24px;
    margin-bottom:12px;
}

.genre{
    color:#38bdf8;
    margin-bottom:10px;
}

.rating{
    color:#cbd5e1;
    margin-bottom:18px;
}

.card-content button{

    width:100%;

    padding:14px;

    border:none;
    border-radius:14px;

    background:
    linear-gradient(to right,#8b5cf6,#6366f1);

    color:white;

    font-weight:600;

    cursor:pointer;

    transition:0.3s;
}

.card-content button:hover{
    opacity:0.9;
}

/* LOADER */

.loader{

    display:none;

    text-align:center;

    font-size:20px;

    margin-bottom:30px;
}

/* EMPTY */

.empty{
    text-align:center;
    width:100%;
    color:#cbd5e1;
}

/* FOOTER */

footer{

    background:#111827;

    text-align:center;

    padding:25px;

    color:#94a3b8;
}

/* RESPONSIVE */

@media(max-width:768px){

    .hero h1{
        font-size:42px;
    }

    .hero p{
        font-size:16px;
    }

    .section-title{
        font-size:30px;
    }

}

</style>
</head>

<body>

<header>

<div class="hero">

<h1>🎬 CineMatch AI</h1>

<p>
Discover trending movies, search by genre,
and get smart recommendations instantly.
</p>

<div class="search-box">

<input
type="text"
id="searchInput"
placeholder="Search movies like action, marvel, sci-fi...">

<button onclick="searchMovies()">
Search Movies
</button>

</div>

</div>

</header>

<h1 class="section-title">
🔥 Trending Movies
</h1>

<div class="loader" id="loader">
Loading Movies...
</div>

<div class="movies" id="moviesContainer">

</div>

<footer>
© 2026 CineMatch AI • Movie Recommendation System
</footer>

<script>

/* FIXED IMAGE LINKS */

const movies = [

{
title:"Inception",
genre:"Sci-Fi",
rating:"8.8",
year:"2010",
image:"https://picsum.photos/400/600?random=1"
},

{
title:"Avengers Endgame",
genre:"Action",
rating:"8.4",
year:"2019",
image:"https://picsum.photos/400/600?random=2"
},

{
title:"Interstellar",
genre:"Sci-Fi",
rating:"8.7",
year:"2014",
image:"https://picsum.photos/400/600?random=3"
},

{
title:"Joker",
genre:"Drama",
rating:"8.5",
year:"2019",
image:"https://picsum.photos/400/600?random=4"
},

{
title:"John Wick",
genre:"Action",
rating:"8.0",
year:"2014",
image:"https://picsum.photos/400/600?random=5"
},

{
title:"Frozen",
genre:"Animation",
rating:"7.5",
year:"2013",
image:"https://picsum.photos/400/600?random=6"
},

{
title:"Batman",
genre:"Action",
rating:"8.2",
year:"2022",
image:"https://picsum.photos/400/600?random=7"
},

{
title:"Titanic",
genre:"Romance",
rating:"7.9",
year:"1997",
image:"https://picsum.photos/400/600?random=8"
}

];

const moviesContainer =
document.getElementById("moviesContainer");

const loader =
document.getElementById("loader");

/* DISPLAY MOVIES */

function displayMovies(movieList){

moviesContainer.innerHTML = "";

if(movieList.length === 0){

moviesContainer.innerHTML = `
<h2 class="empty">
No Movies Found
</h2>
`;

return;

}

movieList.forEach(movie => {

moviesContainer.innerHTML += `

<div class="card">

<div class="overlay">
⭐ ${movie.rating}
</div>

<img
src="${movie.image}"
alt="${movie.title}">

<div class="card-content">

<h2>${movie.title}</h2>

<p class="genre">
🎭 ${movie.genre}
</p>

<p class="rating">
📅 Release Year: ${movie.year}
</p>

<button onclick="recommendMovie('${movie.genre}')">
Recommend Similar
</button>

</div>

</div>

`;

});

}

/* INITIAL DISPLAY */

displayMovies(movies);

/* SEARCH */

function searchMovies(){

const search =
document
.getElementById("searchInput")
.value
.toLowerCase();

loader.style.display = "block";

setTimeout(() => {

loader.style.display = "none";

const filteredMovies = movies.filter(movie =>

movie.title.toLowerCase().includes(search) ||

movie.genre.toLowerCase().includes(search)

);

displayMovies(filteredMovies);

},700);

}

/* RECOMMEND */

function recommendMovie(genre){

loader.style.display = "block";

setTimeout(() => {

loader.style.display = "none";

const recommended =
movies.filter(movie => movie.genre === genre);

displayMovies(recommended);

window.scrollTo({

top:750,
behavior:"smooth"

});

},700);

}

</script>

</body>
</html>
