<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resume Builder</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f1f5f9;
    padding:20px;
}

.container{
    max-width:1300px;
    margin:auto;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:25px;
}

.form-section,
.resume-section{
    background:white;
    border-radius:20px;
    padding:25px;
    box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

h1{
    text-align:center;
    margin-bottom:25px;
    color:#0f172a;
}

.input-group{
    margin-bottom:18px;
}

.input-group label{
    display:block;
    margin-bottom:8px;
    font-weight:bold;
    color:#334155;
}

.input-group input,
.input-group textarea{
    width:100%;
    padding:12px;
    border:1px solid #cbd5e1;
    border-radius:10px;
    outline:none;
    font-size:15px;
}

textarea{
    resize:none;
}

button{
    width:100%;
    padding:14px;
    border:none;
    background:#2563eb;
    color:white;
    border-radius:12px;
    cursor:pointer;
    font-size:17px;
    transition:0.3s;
}

button:hover{
    background:#1d4ed8;
}

/* Resume Design */

.resume{
    border:2px solid #e2e8f0;
    border-radius:15px;
    overflow:hidden;
}

.resume-header{
    background:#2563eb;
    color:white;
    padding:30px;
    text-align:center;
}

.resume-header h2{
    font-size:32px;
}

.resume-header p{
    margin-top:8px;
}

.resume-body{
    padding:25px;
}

.resume-body h3{
    margin-bottom:10px;
    color:#2563eb;
    border-bottom:2px solid #e2e8f0;
    padding-bottom:5px;
}

.resume-body p{
    margin-bottom:15px;
    line-height:1.6;
    color:#334155;
}

.skills{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-bottom:15px;
}

.skill{
    background:#dbeafe;
    color:#1e3a8a;
    padding:8px 12px;
    border-radius:20px;
    font-size:14px;
}

.download-btn{
    margin-top:20px;
    background:#16a34a;
}

.download-btn:hover{
    background:#15803d;
}

@media(max-width:900px){

.container{
    grid-template-columns:1fr;
}

}

</style>
</head>

<body>

<h1>Professional Resume Builder</h1>

<div class="container">

    <!-- FORM -->

    <div class="form-section">

        <div class="input-group">

            <label>Full Name</label>

            <input type="text"
            id="name"
            placeholder="Enter your name">

        </div>

        <div class="input-group">

            <label>Email</label>

            <input type="email"
            id="email"
            placeholder="Enter your email">

        </div>

        <div class="input-group">

            <label>Phone</label>

            <input type="text"
            id="phone"
            placeholder="Enter your phone number">

        </div>

        <div class="input-group">

            <label>Career Objective</label>

            <textarea id="objective"
            rows="4"
            placeholder="Write career objective"></textarea>

        </div>

        <div class="input-group">

            <label>Education</label>

            <textarea id="education"
            rows="4"
            placeholder="Enter education details"></textarea>

        </div>

        <div class="input-group">

            <label>Skills</label>

            <input type="text"
            id="skills"
            placeholder="HTML, CSS, JavaScript">

        </div>

        <div class="input-group">

            <label>Projects</label>

            <textarea id="projects"
            rows="4"
            placeholder="Enter project details"></textarea>

        </div>

        <button onclick="generateResume()">
            Generate Resume
        </button>

    </div>

    <!-- RESUME -->

    <div class="resume-section">

        <div class="resume" id="resume">

            <div class="resume-header">

                <h2 id="rName">Your Name</h2>

                <p id="rEmail">email@example.com</p>

                <p id="rPhone">9876543210</p>

            </div>

            <div class="resume-body">

                <h3>Career Objective</h3>

                <p id="rObjective">
                    Your objective will appear here.
                </p>

                <h3>Education</h3>

                <p id="rEducation">
                    Education details will appear here.
                </p>

                <h3>Skills</h3>

                <div class="skills" id="rSkills">

                    <span class="skill">HTML</span>

                    <span class="skill">CSS</span>

                </div>

                <h3>Projects</h3>

                <p id="rProjects">
                    Project details will appear here.
                </p>

            </div>

        </div>

        <button class="download-btn"
        onclick="downloadResume()">

            <i class="fa-solid fa-download"></i>
            Download Resume

        </button>

    </div>

</div>

<script>

function generateResume(){

    document.getElementById("rName").innerText =
    document.getElementById("name").value;

    document.getElementById("rEmail").innerText =
    document.getElementById("email").value;

    document.getElementById("rPhone").innerText =
    document.getElementById("phone").value;

    document.getElementById("rObjective").innerText =
    document.getElementById("objective").value;

    document.getElementById("rEducation").innerText =
    document.getElementById("education").value;

    document.getElementById("rProjects").innerText =
    document.getElementById("projects").value;

    const skillsInput =
    document.getElementById("skills").value;

    const skillsArray =
    skillsInput.split(",");

    const skillsContainer =
    document.getElementById("rSkills");

    skillsContainer.innerHTML = "";

    skillsArray.forEach(skill => {

        const span =
        document.createElement("span");

        span.classList.add("skill");

        span.innerText = skill.trim();

        skillsContainer.appendChild(span);

    });

}

function downloadResume(){

    window.print();

}

</script>

</body>
</html>
