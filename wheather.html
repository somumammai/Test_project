<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Responsive Weather App</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#00c6ff,#0072ff);
    padding:20px;
}

.container{
    width:100%;
    max-width:420px;
    background:white;
    border-radius:20px;
    padding:30px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
    text-align:center;
    animation:fadeIn 1s ease;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

h1{
    margin-bottom:20px;
    color:#222;
}

.search{
    display:flex;
    gap:10px;
    margin-bottom:20px;
}

.search input{
    flex:1;
    padding:12px;
    border:2px solid #ddd;
    border-radius:10px;
    outline:none;
    font-size:16px;
}

.search button{
    padding:12px 18px;
    border:none;
    border-radius:10px;
    background:#0072ff;
    color:white;
    cursor:pointer;
    transition:0.3s;
}

.search button:hover{
    background:#0056cc;
}

.weather{
    display:none;
}

.weather img{
    width:120px;
    margin-bottom:10px;
}

.temp{
    font-size:50px;
    font-weight:bold;
    color:#222;
}

.city{
    font-size:30px;
    margin-top:10px;
}

.description{
    font-size:20px;
    color:#666;
    margin-top:5px;
}

.details{
    display:flex;
    justify-content:space-between;
    margin-top:25px;
    gap:15px;
}

.box{
    flex:1;
    background:#f1f1f1;
    padding:15px;
    border-radius:15px;
}

.box h3{
    margin-bottom:10px;
    color:#333;
}

.error{
    display:none;
    color:red;
    margin-top:15px;
}

@media(max-width:500px){

.container{
    padding:20px;
}

.temp{
    font-size:40px;
}

.city{
    font-size:24px;
}

.description{
    font-size:18px;
}

.details{
    flex-direction:column;
}

}

</style>
</head>

<body>

<div class="container">

    <h1>Weather App</h1>

    <div class="search">
        <input type="text" id="city" placeholder="Enter city name">
        <button onclick="getWeather()">Search</button>
    </div>

    <p class="error" id="error">
        Invalid city name!
    </p>

    <div class="weather" id="weather">

        <img id="icon"
        src="https://cdn-icons-png.flaticon.com/512/869/869869.png">

        <div class="temp" id="temp">25°C</div>

        <div class="city" id="cityName">Hyderabad</div>

        <div class="description" id="desc">Clear Sky</div>

        <div class="details">

            <div class="box">
                <h3>Humidity</h3>
                <p id="humidity">65%</p>
            </div>

            <div class="box">
                <h3>Wind Speed</h3>
                <p id="wind">10 km/h</p>
            </div>

        </div>

    </div>

</div>

<script>

async function getWeather(){

    const apiKey = "YOUR_API_KEY";

    const city = document.getElementById("city").value;

    const weather = document.getElementById("weather");

    const error = document.getElementById("error");

    if(city === ""){
        alert("Please enter city name");
        return;
    }

    const apiUrl =
    `https://api.openweathermap.org/data/2.5/weather?q=${city}&units=metric&appid=${apiKey}`;

    const response = await fetch(apiUrl);

    if(response.status == 404){

        error.style.display = "block";
        weather.style.display = "none";

    }else{

        const data = await response.json();

        document.getElementById("temp").innerHTML =
        Math.round(data.main.temp) + "°C";

        document.getElementById("cityName").innerHTML =
        data.name;

        document.getElementById("desc").innerHTML =
        data.weather[0].description;

        document.getElementById("humidity").innerHTML =
        data.main.humidity + "%";

        document.getElementById("wind").innerHTML =
        data.wind.speed + " km/h";

        const icon = document.getElementById("icon");

        if(data.weather[0].main == "Clouds"){

            icon.src =
            "https://cdn-icons-png.flaticon.com/512/414/414825.png";

        }else if(data.weather[0].main == "Clear"){

            icon.src =
            "https://cdn-icons-png.flaticon.com/512/869/869869.png";

        }else if(data.weather[0].main == "Rain"){

            icon.src =
            "https://cdn-icons-png.flaticon.com/512/1163/1163657.png";

        }else if(data.weather[0].main == "Drizzle"){

            icon.src =
            "https://cdn-icons-png.flaticon.com/512/3075/3075858.png";

        }else if(data.weather[0].main == "Mist"){

            icon.src =
            "https://cdn-icons-png.flaticon.com/512/4005/4005901.png";

        }

        weather.style.display = "block";

        error.style.display = "none";

    }

}

</script>

</body>
</html>
